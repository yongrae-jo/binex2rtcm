[logging]
level = "INFO"

[validation]
parse_with_pyrtcm = true

[rnx2crx]
#path = "tools/RNXCMP_4.2.0_Windows_mingw_64bit/RNX2CRX.exe"

# 기본값은 로컬 샘플 파일을 재생하는 오프라인 실행 예제입니다.
# 실시간 NTRIP 운영용 설정은 이 파일을 복사해 별도 로컬 설정 파일에서 수정해서 사용하십시오.

[runtime]
# 0 또는 음수면 사용자가 중지할 때까지 계속 실행합니다.
duration_s = 0

[monitor]
enabled = true
interval_s = 1.0

# RTCM metadata/ephemeris 스케줄링 설정
[scheduler]
metadata_interval_s = 30.0
ephemeris_interval_s = 300.0
emit_ephemeris_on_change = true
emit_metadata_on_start = true

[scheduler.msm_level_by_system]
GPS = 7
GLO = 7
GAL = 7
BDS = 7
QZS = 7
IRN = 7
SBS = 7

# 입력 배열
# 공통 입력 가능 항목:
# - name
# - session
# - kind: ntrip_client | tcp_client | file_replay
# - data_format: binex | rtcm
# - chunk_size
# - connect_timeout_s
# - reconnect_delay_s
# - capture_path
# - capture_interval: 5M | 10M | 15M | 30M | 1H | 24H
# - capture_rinex: { enabled, observation, navigation, crx }
#
# kind별 추가 항목:
# - ntrip_client: host, port, mountpoint, username, password,
#   send_nmea_gga, gga_interval_s, source_position_llh
# - tcp_client: host, port
# - file_replay: path, replay_rate

# 출력 배열
# 공통 출력 가능 항목:
# - name
# - session
# - kind: file | tcp_server | tcp_client
# - data_format: binex | rtcm
# - max_queue
# - rinex: { enabled, observation, navigation, crx }  # file output 전용
#
# kind별 추가 항목:
# - file: path, interval
# - tcp_server: host, port
# - tcp_client: host, port

# 기본 오프라인 예제: BINEX 샘플 파일 -> RTCM 파일
[[inputs]]
name = "CHUL sample"
session = "default"
kind = "file_replay"
data_format = "binex"
path = "sample/CHUL_20260327_120000.bnx"
chunk_size = 4096
replay_rate = 0

# TCP client 입력 예시
#[[inputs]]
#name = "default-tcp"
#session = "default"
#kind = "tcp_client"
#data_format = "binex"
#host = "127.0.0.1"
#port = 9001
#chunk_size = 4096
#connect_timeout_s = 10.0
#reconnect_delay_s = 5.0  # 연속 실패 5회 이상이면 다음 재시도는 1시간 뒤
#capture_path = "runs/default/tcp-input.binex"
#capture_interval = "10M"
#capture_rinex = { enabled = true, observation = true, navigation = true, crx = false }

# TCP client 출력 예시
#[[outputs]]
#name = "default-rtcm-upstream"
#session = "default"
#kind = "tcp_client"
#data_format = "rtcm"
#host = "127.0.0.1"
#port = 9100
#max_queue = 512

[[outputs]]
name = "CHUL RTCM"
session = "default"
kind = "file"
data_format = "rtcm"
path = "runs/example/chul.rtcm3"
rinex = { enabled = true, observation = true, navigation = true, crx = false }
max_queue = 512

