[runtime]
duration_s = 60

[tools]
# 예시 경로는 macOS Apple Silicon 기준입니다.
# 현재 OS와 설치 위치에 맞게 ringo_binary를 수정하십시오.
ringo_binary = "tools/ringo/ringo-v0.9.4-macos_arm64/ringo"
approx_time = "2026/03/27 12:00:00"

[artifacts]
workdir = "runs/stream-roundtrip"

[checks]
min_epoch_count = 1
require_matching_epoch_count = true
require_matching_satellite_rows = true
require_matching_signal_fields = true
require_same_constellations = true
validate_obs_layout = true
# 기본 샘플에서는 RINGO가 생성한 BINEX NAV의 continuation 줄 배치 차이로 실패할 수 있어 비활성화합니다.
validate_nav_layout = false

[binex_input]
name = "CHUL BINEX sample"
session = "BINEX"
kind = "file_replay"
path = "sample/CHUL_20260327_120000.bnx"
chunk_size = 4096
replay_rate = 0

[rtcm_input]
name = "CHUL RTCM sample"
session = "RTCM"
kind = "file_replay"
path = "sample/CHUL_20260327_120000.rtcm3"
chunk_size = 4096
replay_rate = 0
